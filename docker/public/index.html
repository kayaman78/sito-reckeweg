<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dr. Reckeweg - Prontuario</title>

<link rel="manifest" href="/manifest.json">

<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<style>
:root{
  --r:#C0392B;--r2:#922B21;--rl:#FDEAEA;--rm:#F5C6C2;
  --crema:#FAF8F5;--grigio:#F0ECE6;--bordo:#DDD8D0;
  --testo:#1C1917;--muted:#78716C;
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --green:#16a34a;--greenl:#dcfce7;
  --amber:#f59e0b;--amberl:#fef3c7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--crema);color:var(--testo);font-family:'Source Sans 3',sans-serif;font-size:16px;overflow:hidden}

/* ── HEADER ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--r);padding:0 10px;height:56px;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 2px 8px rgba(192,57,43,.4);
}
.header-logo{
  font-family:'DM Mono',monospace;color:white;
  font-size:.72rem;letter-spacing:2px;opacity:.85;
  white-space:nowrap;flex-shrink:0;
}
@media(max-width:560px){.header-logo{display:none}}

.search-wrap{flex:1;position:relative;min-width:0}
.search-wrap input{
  width:100%;padding:9px 34px 9px 12px;
  border:none;border-radius:8px;
  background:rgba(255,255,255,.22);
  font-size:.92rem;font-family:'Source Sans 3',sans-serif;
  outline:none;color:white;-webkit-text-fill-color:white;
}
.search-wrap input::placeholder{color:rgba(255,255,255,.6);-webkit-text-fill-color:rgba(255,255,255,.6)}
.search-wrap input:-webkit-autofill{
  -webkit-box-shadow:0 0 0 40px rgba(192,57,43,.7) inset !important;
  -webkit-text-fill-color:white !important;
}
.search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.7);
  font-size:1.1rem;cursor:pointer;display:none;padding:4px;line-height:1;
}
.search-clear.vis{display:block}

.btn-filter,.btn-indice,.btn-edit{
  background:rgba(255,255,255,.18);border:none;border-radius:8px;
  color:white;cursor:pointer;transition:background .15s;
  flex-shrink:0;white-space:nowrap;
  padding:8px 10px;font-size:.82rem;
}
.btn-filter.active{background:rgba(255,255,255,.32)}
.btn-indice:hover{background:rgba(255,255,255,.28)}
.btn-edit{display:none}
.btn-edit.ready{display:flex;align-items:center;gap:4px}
.btn-edit.active{background:var(--amber);color:#1c1917;font-weight:600}

@media(max-width:480px){
  .header{gap:4px;padding:0 8px}
  .btn-filter,.btn-indice{padding:8px 8px;font-size:0}
  .btn-filter::after{content:'☰';font-size:.95rem}
  .btn-indice::after{content:'📋';font-size:.95rem}
  .btn-edit{padding:8px 8px}
  .btn-edit.active{font-size:.75rem;padding:6px 8px}
}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;padding-top:56px}

.sidebar{
  width:320px;min-width:260px;background:white;
  border-right:1px solid var(--bordo);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
@media(max-width:700px){
  .sidebar{
    width:100%;position:fixed;
    top:56px;left:0;right:0;bottom:60px;z-index:100;
  }
  .sidebar.hidden{display:none}
  .detail{
    position:fixed;top:56px;left:0;right:0;bottom:60px;
    overflow-y:auto;z-index:100;
  }
  .detail.hidden{display:none}
  .layout{padding-bottom:60px}
}

/* ── FILTRI ── */
.filters-panel{
  background:var(--grigio);border-bottom:1px solid var(--bordo);
  overflow:hidden;max-height:0;transition:max-height .25s ease;
}
.filters-panel.open{max-height:240px}
.filters-inner{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.72rem;color:var(--muted);white-space:nowrap}
.chip{
  padding:4px 11px;border:1px solid var(--bordo);border-radius:20px;
  font-size:.76rem;background:white;cursor:pointer;
  transition:all .15s;color:var(--muted);white-space:nowrap;user-select:none;
}
.chip.on{background:var(--r);color:white;border-color:var(--r);font-weight:600}

/* ── LISTA ── */
.list-info{
  padding:8px 14px 6px;font-size:.78rem;color:var(--muted);
  border-bottom:1px solid var(--bordo);background:var(--crema);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:4px;
}
.remedy-list{overflow-y:auto;flex:1;overscroll-behavior:contain}
.remedy-item{
  padding:11px 14px;border-bottom:1px solid var(--bordo);
  cursor:pointer;transition:background .1s;
  display:flex;align-items:flex-start;gap:10px;
}
.remedy-item.active{background:var(--rl);border-left:3px solid var(--r)}
.item-badge-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:2px}
.item-code{
  background:var(--r);color:white;border-radius:5px;
  padding:2px 7px;font-family:'DM Mono',monospace;
  font-size:.72rem;font-weight:500;min-width:38px;text-align:center;
}
.item-code.non-disp{background:var(--muted)}
.item-flag .fi{width:1.15em;height:.86em;border-radius:2px;display:block;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
.item-nome{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;line-height:1.3}
.item-preview{font-size:.77rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag{padding:1px 6px;border-radius:10px;font-size:.67rem;background:var(--grigio);color:var(--muted);margin-top:4px;display:inline-block}

/* ── DETTAGLIO ── */
.detail{flex:1;overflow-y:auto;background:var(--crema);overscroll-behavior:contain}
.detail-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:16px;
  color:var(--muted);text-align:center;padding:24px;
}
.dcard{max-width:780px;margin:20px auto;padding:0 16px 40px}
.dcard-header{
  background:var(--r);border-radius:12px 12px 0 0;
  padding:20px;display:flex;align-items:center;
  gap:14px;flex-wrap:wrap;
}
.dcard-code-wrap{
  font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:500;
  color:white;background:rgba(0,0,0,.15);border-radius:8px;
  padding:6px 14px;letter-spacing:1px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:5px;line-height:1;
}
.dcard-india .fi{width:1.7em;height:1.28em;border-radius:3px;display:block;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
.dcard-title{flex:1;min-width:0}
.dcard-title h2{font-family:'Crimson Pro',serif;font-size:1.35rem;font-weight:600;color:white;line-height:1.3}
.dcard-meta{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.app-badge{background:rgba(255,255,255,.2);color:white;border-radius:4px;padding:2px 8px;font-size:.72rem;font-family:'DM Mono',monospace}
.dcard-body{background:white;border-radius:0 0 12px 12px;box-shadow:var(--shadow)}
.dsec{padding:16px 20px;border-bottom:1px solid var(--bordo)}
.dsec:last-child{border-bottom:none}
.dsec-label{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;
  color:var(--r);font-weight:500;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.dsec-label::after{content:'';flex:1;height:1px;background:var(--rl)}
.indicazioni{font-size:.92rem;line-height:1.7;color:var(--testo)}

/* ── SINTOMI ── */
.sintomi-grid{display:flex;flex-wrap:wrap;gap:5px}
.sintomo-chip{
  padding:4px 10px;border-radius:12px;font-size:.76rem;
  background:var(--grigio);color:var(--muted);
  border:1px solid var(--bordo);cursor:pointer;
  transition:all .15s;user-select:none;
}
.sintomo-chip:hover{background:var(--rl);color:var(--r);border-color:var(--rm)}
.sintomo-chip.active{background:var(--r);color:white;border-color:var(--r)}
.filter-pill{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--rl);color:var(--r);border:1px solid var(--rm);
  border-radius:12px;padding:2px 8px;font-size:.75rem;font-weight:600;
}
.filter-pill button{background:none;border:none;color:var(--r);cursor:pointer;font-size:.85rem;line-height:1;padding:0 0 0 2px}

/* ── INDICE SINTOMI ── */
.idx-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(28,25,23,.55);z-index:600;
  overflow-y:auto;padding:20px 12px;
  -webkit-overflow-scrolling:touch;
}
.idx-overlay.open{display:block}
.idx-card{background:white;border-radius:16px;max-width:780px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.idx-header{background:var(--r);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.idx-header h3{font-family:'Crimson Pro',serif;font-size:1.2rem;color:white;font-weight:600}
.idx-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:34px;height:34px;color:white;cursor:pointer;font-size:1rem;flex-shrink:0}
.idx-search{padding:12px 20px;border-bottom:1px solid var(--bordo);background:var(--crema)}
.idx-search input{
  width:100%;padding:9px 12px;border:1px solid var(--bordo);border-radius:8px;
  font-size:.9rem;font-family:'Source Sans 3',sans-serif;
  outline:none;background:white;
  color:var(--testo);-webkit-text-fill-color:var(--testo);
}
.idx-search input:focus{border-color:var(--r)}
.idx-body{padding:14px 20px 24px;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.idx-letter{margin-bottom:18px}
.idx-letter-head{
  font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:2px;
  color:var(--r);font-weight:600;text-transform:uppercase;
  padding:5px 0 7px;border-bottom:1px solid var(--rl);margin-bottom:8px;
}
.idx-chips{display:flex;flex-wrap:wrap;gap:6px}
.idx-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  background:var(--crema);border:1px solid var(--bordo);
  cursor:pointer;transition:all .15s;font-size:.84rem;
}
.idx-chip:hover,.idx-chip:active{border-color:var(--r);background:var(--rl)}
.idx-chip.from-assoc{border-style:dashed;color:var(--muted)}
.idx-count{
  font-family:'DM Mono',monospace;font-size:.68rem;
  background:var(--r);color:white;border-radius:10px;
  padding:1px 6px;min-width:18px;text-align:center;
}

/* ── INGREDIENTI ── */
.ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:7px}
.ing-chip{
  border:1px solid var(--bordo);border-radius:7px;padding:7px 11px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;transition:all .15s;background:var(--crema);gap:6px;
}
.ing-chip:hover{border-color:var(--r);background:var(--rl)}
.ing-chip.shared{border-color:var(--green);background:var(--greenl)}
.ing-name{font-size:.84rem;flex:1}
.ing-dil{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--r);font-weight:500;white-space:nowrap}
.ing-chip.shared .ing-dil{color:var(--green)}
.forma-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.forma-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--bordo);font-size:.82rem;cursor:pointer;background:white;color:var(--muted)}
.forma-tab.on{background:var(--r);color:white;border-color:var(--r)}

/* ── IMPIEGO SPECIFICO ── */
.impiego-box{
  background:var(--rl);border-left:3px solid var(--r);
  border-radius:0 8px 8px 0;padding:10px 14px;
  font-size:.88rem;line-height:1.7;color:var(--testo);
  margin-top:8px;
}
.impiego-label{
  font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:1px;
  color:var(--r);font-weight:500;text-transform:uppercase;
  margin-bottom:6px;
}

/* ── POSOLOGIA ── */
.poso-box{
  background:var(--rl);border-left:3px solid var(--r);
  border-radius:0 8px 8px 0;padding:12px 14px;
  font-size:.88rem;line-height:1.7;color:var(--testo);margin-bottom:8px;
}
.poso-forma{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:1px;color:var(--r);font-weight:500;margin-bottom:6px;text-transform:uppercase}

/* ── ASSOCIAZIONI ── */
.assoc-row{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:8px;background:var(--crema);border:1px solid var(--bordo);
  margin-bottom:6px;flex-wrap:wrap;
}
.assoc-cond{flex:1;font-size:.87rem;color:var(--testo);min-width:100px}
.assoc-badges{display:flex;gap:4px;flex-wrap:wrap}
.assoc-badge{
  background:var(--r);color:white;border-radius:4px;
  padding:3px 9px;font-family:'DM Mono',monospace;font-size:.72rem;
  cursor:pointer;white-space:nowrap;user-select:none;
}
.assoc-badge:hover{background:var(--r2)}
.backlink-wrap{display:flex;flex-wrap:wrap;gap:6px}

/* ── CONFRONTO ── */
.btn-compare{
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
  border-radius:6px;color:white;padding:6px 12px;
  font-size:.8rem;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.btn-compare:hover,.btn-compare.added{background:rgba(255,255,255,.35);border-color:white}
.compare-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:white;border-top:2px solid var(--r);
  padding:10px 16px;display:none;align-items:center;
  gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.12);
}
.compare-bar.vis{display:flex}
@media(max-width:700px){.compare-bar{bottom:60px}}
.compare-slots{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.compare-slot{
  background:var(--rl);border:1px solid var(--rm);border-radius:6px;
  padding:4px 10px;font-family:'DM Mono',monospace;font-size:.78rem;
  color:var(--r);display:flex;align-items:center;gap:6px;
}
.compare-slot button{background:none;border:none;color:var(--r);cursor:pointer;font-size:.9rem;line-height:1;padding:0 2px}
.btn-compare-go{background:var(--r);color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap}
.btn-compare-clear{background:none;border:1px solid var(--bordo);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:.82rem;color:var(--muted)}

/* ── MODALE CONFRONTO ── */
.cmp-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:600;overflow-y:auto;padding:20px 12px}
.cmp-overlay.open{display:block}
.cmp-card{background:white;border-radius:16px;max-width:1000px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.cmp-header{background:var(--r);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.cmp-header h3{font-family:'Crimson Pro',serif;font-size:1.2rem;color:white;font-weight:600}
.cmp-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:white;cursor:pointer;font-size:1rem}
.cmp-legend{padding:10px 20px;background:var(--grigio);border-bottom:1px solid var(--bordo);font-size:.78rem;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:11px;height:11px;border-radius:50%}
.cmp-cols{display:grid;gap:0}
.cmp-col-header{padding:12px 16px;border-bottom:1px solid var(--bordo);border-right:1px solid var(--bordo);background:var(--crema)}
.cmp-col-header:last-child{border-right:none}
.cmp-col-code{font-family:'DM Mono',monospace;font-size:1rem;font-weight:600;color:var(--r)}
.cmp-col-nome{font-family:'Crimson Pro',serif;font-size:.85rem;color:var(--muted);margin-top:2px}
.cmp-ing-section{padding:12px 16px;border-right:1px solid var(--bordo)}
.cmp-ing-section:last-child{border-right:none}
.cmp-ing-item{display:flex;justify-content:space-between;align-items:center;padding:4px 7px;border-radius:5px;margin-bottom:4px;font-size:.81rem;gap:8px}
.cmp-ing-item.shared-all{background:var(--greenl);border:1px solid #86efac}
.cmp-ing-item.shared-some{background:#fef9c3;border:1px solid #fde047}
.cmp-ing-item.unique{background:var(--crema);border:1px solid var(--bordo)}
.cmp-ing-item.absent{opacity:.28}
.cmp-ing-dil{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);flex-shrink:0}
.cmp-ing-item.shared-all .cmp-ing-dil{color:var(--green)}
.cmp-summary{padding:14px 20px;background:var(--grigio);border-top:1px solid var(--bordo);font-size:.83rem;color:var(--muted)}

/* ── MODALE INGREDIENTE ── */
.ing-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:550;overflow-y:auto;padding:20px 12px}
.ing-overlay.open{display:block}
.ing-modal{background:white;border-radius:16px;max-width:680px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.ing-modal-header{background:var(--r);padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.ing-modal-nome{font-family:'Crimson Pro',serif;font-size:1.5rem;font-weight:600;color:white;font-style:italic;line-height:1.2}
.ing-modal-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:white;cursor:pointer;font-size:1rem;flex-shrink:0;margin-top:2px}
.ing-modal-stats{padding:10px 20px;background:var(--grigio);border-bottom:1px solid var(--bordo);font-size:.8rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ing-body{padding:0}
.pot-block{border-bottom:1px solid var(--bordo)}
.pot-block:last-child{border-bottom:none}
.pot-header{padding:10px 20px 8px;background:var(--crema);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bordo)}
.pot-badge{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:600;color:var(--r);background:var(--rl);border:1px solid var(--rm);border-radius:5px;padding:3px 10px}
.pot-count{font-size:.75rem;color:var(--muted)}
.pot-entries{padding:6px 20px 10px}
.pot-entry{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--grigio)}
.pot-entry:last-child{border-bottom:none}
.pot-cod{flex-shrink:0;padding-top:1px}
.pot-cod-badge{background:var(--r);color:white;border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;display:inline-block}
.pot-cod-badge:hover{background:var(--r2)}
.pot-details{flex:1;min-width:0}
.pot-rimedio-nome{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:3px}
.pot-prop{font-size:.86rem;line-height:1.55;color:var(--testo)}
.pot-prop.empty{color:var(--muted);font-style:italic}

/* ── NOTE ── */
.note-box{
  background:var(--amberl);border-left:3px solid var(--amber);
  border-radius:0 8px 8px 0;padding:12px 14px;
  font-size:.9rem;line-height:1.7;color:var(--testo);min-height:2em;
}
.assoc-badge-edit{
  background:var(--rl);color:var(--r);border:1px solid var(--rm);
  border-radius:4px;padding:2px 6px;font-family:'DM Mono',monospace;
  font-size:.72rem;min-width:32px;text-align:center;
  display:inline-block;cursor:text;
}
.assoc-badge-edit:focus{outline:2px solid var(--amber);background:white}

/* ── EDIT MODE ── */
.disp-sec{display:none}
body.edit-mode .disp-sec{display:block}
body.edit-mode [data-path]{
  outline:1px dashed var(--amber);border-radius:3px;
  background:var(--amberl) !important;
  color:var(--testo) !important;-webkit-text-fill-color:var(--testo) !important;
  cursor:text;min-height:1.2em;
  transition:outline .1s,background .1s;white-space:pre-wrap;
}
body.edit-mode [data-path]:focus{
  outline:2px solid var(--amber);background:white !important;
  color:var(--testo) !important;-webkit-text-fill-color:var(--testo) !important;
  box-shadow:0 0 0 3px rgba(245,158,11,.2);
}
[data-path]{white-space:pre-wrap}

.disp-radio-group{display:flex;flex-direction:column;gap:7px}
.disp-radio-opt{
  display:flex;align-items:center;gap:10px;font-size:.87rem;
  cursor:pointer;padding:8px 12px;border-radius:7px;
  border:1px solid var(--bordo);transition:background .12s;user-select:none;
}
.disp-radio-opt:hover{background:var(--grigio)}
.disp-radio-opt input[type=radio]{accent-color:var(--r);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.opt-badge{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;border-radius:4px;padding:2px 7px;color:white}
.opt-badge.red{background:var(--r)}
.opt-badge.grey{background:var(--muted)}

/* ── RICH TEXT TOOLBAR ── */
#rtoolbar{
  position:fixed;z-index:500;background:white;
  border:1px solid var(--bordo);border-radius:10px;
  padding:5px 8px;box-shadow:var(--shadow-lg);
  display:none;align-items:center;gap:2px;pointer-events:all;
}
#rtoolbar.vis{display:flex}
.rt-btn{
  background:none;border:none;border-radius:5px;
  width:30px;height:30px;cursor:pointer;font-size:.88rem;
  display:flex;align-items:center;justify-content:center;
  color:var(--testo);transition:background .1s;
}
.rt-btn:hover{background:var(--grigio)}
.rt-btn.active-fmt{background:var(--rl);color:var(--r)}
.rt-sep{width:1px;height:20px;background:var(--bordo);margin:0 3px;flex-shrink:0}
.rt-color{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--bordo);cursor:pointer;
  transition:transform .1s;flex-shrink:0;
}
.rt-color:hover{transform:scale(1.2);border-color:var(--testo)}

/* ── EDIT BAR ── */
.edit-bar{
  position:fixed;top:56px;left:0;right:0;z-index:250;
  background:var(--amber);padding:7px 14px;
  display:none;align-items:center;gap:8px;
  box-shadow:0 2px 8px rgba(245,158,11,.4);flex-wrap:wrap;
}
.edit-bar.vis{display:flex}
.edit-bar-msg{flex:1;font-size:.82rem;font-weight:600;color:#1c1917;min-width:100px}
.btn-eb{border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:.80rem;font-weight:600;white-space:nowrap}
.btn-eb-save{background:#1c1917;color:white}
.btn-eb-save:disabled{opacity:.5;cursor:not-allowed}
.btn-eb-cancel{background:rgba(0,0,0,.15);color:#1c1917}
.btn-eb-new{background:#fff;color:var(--r);border:1px solid var(--r)}
.btn-eb-new:hover{background:var(--rl)}
body.edit-mode .layout{padding-top:calc(56px + 42px)}
body.edit-mode .sidebar{top:calc(56px + 42px)}
@media(max-width:700px){body.edit-mode .detail{top:calc(56px + 42px)}}

/* ── MOBILE NAV ── */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  z-index:150;background:white;border-top:1px solid var(--bordo);height:60px;
}
@media(max-width:700px){.bottom-nav{display:flex}}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  cursor:pointer;font-size:.65rem;color:var(--muted);
}
.bnav-btn.active{color:var(--r)}

mark{background:rgba(192,57,43,.15);color:inherit;border-radius:2px;padding:0 1px}

      <div class="leg-item"><div class="leg-dot" style="background:#86efac"></div>Comune a tutti</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fde047"></div>Comune ad alcuni</div>

<script>
// ── Stato globale ─────────────────────────────────────────────────────
let searchQ = '', filterSistema = null, filterForma = null,
    filterDispOnly = false, filterSintomo = null, activeIdx = null;
let isMobile = window.innerWidth <= 700, compareList = [];
let editMode = false, serverAvail = false, activeEditEl = null;

const ING_INDEX = {}, BACKLINKS = {}, ING_SEARCH = {};
const SINTOMI_INDEX = {}, ASSOC_TERMS = new Set();

// ── Disponibilità ─────────────────────────────────────────────────────
function getDispState(r) {
  if (r.disponibile !== false) return 'available';
  if (r.disponibile_india === true) return 'india';
  return 'unavailable';
}
function indiaFlag(size) {
  const s = size === 'lg'
    ? 'width:1.75em;height:1.3em'
    : 'width:1.15em;height:.86em';
  return `<span class="item-flag"><span class="fi fi-in" style="${s};border-radius:2px;display:inline-block;box-shadow:0 0 0 1px rgba(0,0,0,.1)"></span></span>`;
}

// ── Testo ─────────────────────────────────────────────────────────────
function renderText(s) {
  if (!s) return '';
  if (s.includes('<')) return s;
  return s.replace(/\n/g, '<br>');
}
function escJs(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
function markModified() {
  document.getElementById('editMsg').textContent = '✏️ Modifiche non salvate — ricorda di salvare';
  document.getElementById('editMsg').style.color = '#7c2d12';
}

// ── Impiego specifico per forma ───────────────────────────────────────
// Rimuove GOCCE/COMPRESSE/SCIROPPO dall'inizio di un testo
function stripFormKeyword(text) {
  return text.replace(/^(GOCCE|COMPRESSE|SCIROPPO)\s*/i, '').trim();
}

function parseImpiego(text, forme) {
  if (!text || !forme.length) return {};
  const result = {};
  forme.forEach((f, i) => {
    const uf = f.toUpperCase();
    const nextForms = forme.slice(i + 1).map(g => g.toUpperCase());
    const re = nextForms.length
      ? new RegExp(uf + '\\s*([\\s\\S]*?)(?=' + nextForms.join('|') + ')', 'i')
      : new RegExp(uf + '\\s*([\\s\\S]+)', 'i');
    const m = text.match(re);
    if (m && m[1] && m[1].trim()) result[f] = stripFormKeyword(m[1].trim());
  });
  // Fallback: nessun keyword trovato → testo intero sulla prima forma, strippato
  if (!Object.keys(result).length && text.trim()) {
    result[forme[0]] = stripFormKeyword(text.trim());
  }
  return result;
}

function impiegoBox(text, idx) {
  if (!text) return '';
  return `<div class="impiego-box"><div class="impiego-label">USO SPECIFICO</div><span data-path="${idx}.impiego_specifico" contenteditable="false">${renderText(text)}</span></div>`;
}

// ── Init ──────────────────────────────────────────────────────────────
function initApp() {
  if (typeof RIMEDI === 'undefined') { alert('data.js non trovato!'); return; }

  RIMEDI.forEach(r => {
    (r.sintomi_indice || []).forEach(s => {
      if (!SINTOMI_INDEX[s]) SINTOMI_INDEX[s] = new Set();
      SINTOMI_INDEX[s].add(r.codice);
    });
    (r.associazioni || []).forEach(a => {
      if (!a.condizione) return;
      const c = a.condizione.trim();
      ASSOC_TERMS.add(c);
      if (!SINTOMI_INDEX[c]) SINTOMI_INDEX[c] = new Set();
      SINTOMI_INDEX[c].add(r.codice);
      (a.rimedi || []).forEach(cod => SINTOMI_INDEX[c].add(cod));
    });
  });

  RIMEDI.forEach((r, ridx) => {
    Object.entries(r.composizione || {}).forEach(([forma, list]) => {
      (list || []).forEach((ing, ingidx) => {
        if (!ing.nome) return;
        if (!ING_INDEX[ing.nome]) ING_INDEX[ing.nome] = [];
        ING_INDEX[ing.nome].push({
          codice: r.codice, rimNome: r.nome || r.codice,
          ridx, forma, ingidx,
          tipo: ing.tipo || 'D', potenza: ing.potenza || 0,
          proprieta: (ing.proprieta || '').trim()
        });
        const nl = ing.nome.toLowerCase();
        if (!ING_SEARCH[nl]) ING_SEARCH[nl] = new Set();
        ING_SEARCH[nl].add(r.codice);
      });
    });
    (r.associazioni || []).forEach(a => {
      (a.rimedi || []).forEach(c => {
        (BACKLINKS[c] = BACKLINKS[c] || []).indexOf(r.codice) < 0 && BACKLINKS[c].push(r.codice);
      });
    });
  });

  const sistemi = [...new Set(RIMEDI.map(r => r.sistema).filter(Boolean))].sort();
  const fsEl = document.getElementById('filterSistema');
  sistemi.forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip'; c.textContent = s; c.dataset.sistema = s;
    c.onclick = () => {
      document.querySelectorAll('[data-sistema]').forEach(x => x.classList.remove('on'));
      filterSistema = (filterSistema === s) ? null : s;
      if (filterSistema) c.classList.add('on');
      renderList();
    };
    fsEl.appendChild(c);
  });

  renderList();

  fetch('/api/ping').then(r => r.json()).then(d => {
    if (d.ok) {
      serverAvail = true;
      document.getElementById('btnEdit').classList.add('ready');
    }
  }).catch(() => {});
}

// ── Lista ─────────────────────────────────────────────────────────────
function renderList() {
  const tokens = searchQ.trim().toLowerCase().split(/\s+/).filter(Boolean);

  const visible = RIMEDI.filter(r => {
    const assocConds = (r.associazioni || []).map(a => a.condizione || '').join(' ');
    const hay = [r.codice, r.nome, r.indicazioni, r.sistema,
                 (r.sintomi_indice || []).join(' '), assocConds].join(' ').toLowerCase();

    const matchRim = !tokens.length || tokens.every(t => hay.includes(t));
    const matchIng = !tokens.length || tokens.every(t => {
      if (hay.includes(t)) return true;
      for (const nl of Object.keys(ING_SEARCH))
        if (nl.includes(t) && ING_SEARCH[nl].has(r.codice)) return true;
      return false;
    });
    const matchSintomo = !filterSintomo ||
      (SINTOMI_INDEX[filterSintomo] && SINTOMI_INDEX[filterSintomo].has(r.codice));

    return (matchRim || matchIng) && matchSintomo &&
           (!filterSistema || r.sistema === filterSistema) &&
           (!filterForma   || (r.forma || []).includes(filterForma)) &&
           (!filterDispOnly || r.disponibile === false);
  });

  document.getElementById('listCount').textContent = visible.length + ' rimedi';

  const pill = document.getElementById('sintomoActivePill');
  if (filterSintomo)
    pill.innerHTML = `<span class="filter-pill">${filterSintomo}<button onclick="clearSintomo()">✕</button></span>`;
  else
    pill.innerHTML = '';

  document.getElementById('remedyList').innerHTML = visible.map(r => {
    const ri = RIMEDI.indexOf(r);
    const prev = (r.indicazioni || (r.sintomi_indice || []).slice(0, 3).join(', ') || '')
      .replace(/<[^>]+>/g, '').substring(0, 65);
    const state = getDispState(r);
    return `<div class="remedy-item ${activeIdx === ri ? 'active' : ''}" onclick="showDetail(${ri})">
      <div class="item-badge-wrap">
        <div class="item-code${state === 'unavailable' ? ' non-disp' : ''}">${r.codice}</div>
        ${state === 'india' ? indiaFlag('sm') : ''}
      </div>
      <div style="min-width:0">
        <div class="item-nome">${r.nome || '—'}</div>
        <div class="item-preview">${prev}…</div>
        ${r.sistema ? `<span class="tag">${r.sistema}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Dettaglio ─────────────────────────────────────────────────────────
function showDetail(idx) {
  activeIdx = idx;
  const r = RIMEDI[idx];
  const forme = Object.keys(r.composizione || {});

  // Parsing impiego_specifico per forma
  const impiegoMap = parseImpiego(r.impiego_specifico, forme);

  let compHTML = '';
  if (!forme.length)
    compHTML = '<em style="color:var(--muted);font-size:.85rem">Non disponibile</em>';
  else if (forme.length === 1)
    compHTML = ingGrid(r.composizione[forme[0]], r.codice, idx, forme[0])
             + impiegoBox(impiegoMap[forme[0]], idx);
  else
    compHTML =
      '<div class="forma-tabs">' +
      forme.map((f, i) =>
        `<div class="forma-tab ${i === 0 ? 'on' : ''}" onclick="switchForma(this,'${f}')">${f}</div>`
      ).join('') + '</div>' +
      forme.map((f, i) =>
        `<div class="ing-panel" data-forma="${f}" style="${i > 0 ? 'display:none' : ''}">
          ${ingGrid(r.composizione[f], r.codice, idx, f)}
          ${impiegoBox(impiegoMap[f], idx)}
        </div>`
      ).join('');

  const posoHTML = Object.entries(r.posologia || {})
    .filter(([, v]) => v)
    .map(([k, v]) =>
      `<div class="poso-box">
        <div class="poso-forma">${k}</div>
        <span data-path="${idx}.posologia.${k}" contenteditable="false">${renderText(v)}</span>
      </div>`
    ).join('');

  const appBadges = (r.tutti_apparati || []).map(a => `<span class="app-badge">${a}</span>`).join('');

  const sintomiHTML = (r.sintomi_indice || []).length
    ? `<div class="dsec">
        <div class="dsec-label">Indicazioni terapeutiche</div>
        <div class="sintomi-grid">
          ${r.sintomi_indice.map(s =>
            `<span class="sintomo-chip${filterSintomo === s ? ' active' : ''}"
              onclick="filterBySintomo('${escJs(s)}')">${s}</span>`
          ).join('')}
        </div>
      </div>`
    : '';

  const bl = BACKLINKS[r.codice] || [];
  const backHTML = bl.length
    ? `<div class="dsec">
        <div class="dsec-label">Consigliato in associazione da</div>
        <div class="backlink-wrap">
          ${bl.map(c => `<span class="assoc-badge" onclick="goToRimedio('${c}')">${c}</span>`).join('')}
        </div>
      </div>`
    : '';

  const inC = compareList.some(x => x.idx === idx);
  const noteContent = r.note || '';
  const state = getDispState(r);
  const titleFlag = state === 'india' ? `<div class="dcard-india">${indiaFlag('lg')}</div>` : '';

  const dispToggle = `
    <div class="dsec disp-sec">
      <div class="dsec-label">Disponibilità</div>
      <div class="disp-radio-group">
        <label class="disp-radio-opt">
          <input type="radio" name="disp-${idx}" value="available"
            ${state === 'available' ? 'checked' : ''}
            onchange="setDispState(${idx},'available')">
          <span class="opt-badge red">${r.codice}</span> Disponibile
        </label>
        <label class="disp-radio-opt">
          <input type="radio" name="disp-${idx}" value="india"
            ${state === 'india' ? 'checked' : ''}
            onchange="setDispState(${idx},'india')">
          <span class="opt-badge red">${r.codice}</span>&nbsp;${indiaFlag('sm')}&nbsp;Disponibile in India (eBay)
        </label>
        <label class="disp-radio-opt">
          <input type="radio" name="disp-${idx}" value="unavailable"
            ${state === 'unavailable' ? 'checked' : ''}
            onchange="setDispState(${idx},'unavailable')">
          <span class="opt-badge grey">${r.codice}</span> Non disponibile
        </label>
      </div>
    </div>`;

  document.getElementById('detail').innerHTML = `
    <div class="dcard">
      <div class="dcard-header">
        <div class="dcard-code-wrap" id="dcard-code-${idx}">${r.codice}${titleFlag}</div>
        <div class="dcard-title">
          <h2><span data-path="${idx}.nome" contenteditable="false">${renderText(r.nome || '—')}</span></h2>
          ${appBadges ? `<div class="dcard-meta">${appBadges}</div>` : ''}
        </div>
        <button class="btn-compare ${inC ? 'added' : ''}"
          onclick="toggleCompare(${idx})" id="cmpBtn-${idx}">
          ${inC ? '✓ Confronto' : '+ Confronta'}
        </button>
      </div>
      <div class="dcard-body">
        <div class="dsec">
          <div class="dsec-label">Impiego generale</div>
          <div class="indicazioni">
            <span data-path="${idx}.indicazioni" contenteditable="false">${renderText(r.indicazioni || '')}</span>
          </div>
        </div>
        ${sintomiHTML}
        ${forme.length ? `<div class="dsec"><div class="dsec-label">Composizione</div>${compHTML}</div>` : ''}
        ${posoHTML ? `<div class="dsec"><div class="dsec-label">Posologia</div>${posoHTML}</div>` : ''}
        ${(r.proprieta || editMode) ? `<div class="dsec${editMode ? '' : ''}">
          <div class="dsec-label">Proprietà</div>
          <div class="indicazioni">
            <span data-path="${idx}.proprieta" contenteditable="false">${renderText(r.proprieta || '')}</span>
          </div>
          ${!r.proprieta && editMode ? '<div style="font-size:.85rem;color:var(--muted);font-style:italic;margin-top:6px">Campo vuoto — scrivi qui le proprietà</div>' : ''}
        </div>` : ''}
        ${renderAssoc(r, idx)}
        ${backHTML}
        <div class="dsec">
          <div class="dsec-label">Note</div>
          <span class="note-box" data-path="${idx}.note" contenteditable="false" style="display:block">
            ${renderText(noteContent)}
          </span>
          ${!noteContent && !editMode
            ? '<div style="font-size:.85rem;color:var(--muted);font-style:italic;margin-top:6px">Attiva ✏️ per aggiungere note</div>'
            : ''}
        </div>
        ${dispToggle}
      </div>
    </div>`;

  if (editMode) applyEditMode();
  if (isMobile) mobileTab('dettaglio');
  renderList();
}

// ── Ingredienti ───────────────────────────────────────────────────────
function ingGrid(list, thisCod, ridx, forma) {
  if (!list || !list.length)
    return '<em style="color:var(--muted);font-size:.85rem">—</em>';

  const otherIdxs = compareList
    .filter(x => RIMEDI[x.idx].codice !== thisCod)
    .map(x => x.idx);
  const sharedWith = new Set();
  if (otherIdxs.length) {
    const oSets = otherIdxs.map(i =>
      new Set(Object.values(RIMEDI[i].composizione || {}).flat().map(x => x.nome))
    );
    list.forEach(i => { if (oSets.some(s => s.has(i.nome))) sharedWith.add(i.nome); });
  }

  return `<div class="ing-grid">${list.map(i => {
    const sh = sharedWith.has(i.nome);
    const dil = `${i.tipo || 'D'}${i.potenza || ''}`;
    return `<div class="ing-chip ${sh ? 'shared' : ''}" onclick="showIngrediente('${escJs(i.nome)}')">
      <span class="ing-name">${i.nome}</span>
      <span class="ing-dil">${dil}</span>
    </div>`;
  }).join('')}</div>`;
}

// ── Modale ingrediente ────────────────────────────────────────────────
function showIngrediente(nome) {
  const entries = ING_INDEX[nome];
  if (!entries || !entries.length) return;

  const byPot = {};
  entries.forEach(e => {
    const k = `${e.tipo || 'D'}${e.potenza || ''}`;
    (byPot[k] = byPot[k] || []).push(e);
  });
  const potKeys = Object.keys(byPot).sort((a, b) =>
    (parseInt(a.replace(/\D/g, '')) || 0) - (parseInt(b.replace(/\D/g, '')) || 0)
  );
  const codiciUnici = [...new Set(entries.map(e => e.codice))];

  document.getElementById('ingNome').textContent = nome;
  document.getElementById('ingSubtitle').textContent =
    `Presente in ${codiciUnici.length} ${codiciUnici.length === 1 ? 'rimedio' : 'rimedi'} · ` +
    `${potKeys.length} ${potKeys.length === 1 ? 'diluizione' : 'diluizioni'}`;
  document.getElementById('ingStats').innerHTML =
    codiciUnici.map(c =>
      `<span class="assoc-badge" onclick="closeIngOverlay();goToRimedio('${c}')">${c}</span>`
    ).join(' ');

  document.getElementById('ingBody').innerHTML = potKeys.map(pot => {
    const pe = byPot[pot];
    return `<div class="pot-block">
      <div class="pot-header">
        <span class="pot-badge">${pot}</span>
        <span class="pot-count">${pe.length} ${pe.length === 1 ? 'rimedio' : 'rimedi'}</span>
      </div>
      <div class="pot-entries">
        ${pe.map(e => `
          <div class="pot-entry">
            <div class="pot-cod">
              <span class="pot-cod-badge" onclick="closeIngOverlay();goToRimedio('${e.codice}')">${e.codice}</span>
            </div>
            <div class="pot-details">
              <div class="pot-rimedio-nome">${e.rimNome || e.codice}</div>
              <div class="pot-prop ${e.proprieta ? '' : 'empty'}" data-path="${e.ridx}.composizione.${e.forma}.${e.ingidx}.proprieta" contenteditable="false">${renderText(e.proprieta) || 'Nessuna descrizione.'}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  if (editMode) applyEditMode();
  document.getElementById('ingOverlay').classList.add('open');
}
function closeIngOverlay() { document.getElementById('ingOverlay').classList.remove('open'); }
function ingOverlayClick(e) { if (e.target.id === 'ingOverlay') closeIngOverlay(); }

// ── Rich text ─────────────────────────────────────────────────────────
function fmtEvt(e, cmd, val) {
  e.preventDefault();
  if (!activeEditEl) return;
  activeEditEl.focus();
  document.execCommand(cmd, false, val || null);
  syncEditEl(activeEditEl);
  updateToolbarState();
}
function updateToolbarState() {
  if (!activeEditEl) return;
  document.getElementById('rt-bold').classList.toggle('active-fmt', document.queryCommandState('bold'));
  document.getElementById('rt-italic').classList.toggle('active-fmt', document.queryCommandState('italic'));
  document.getElementById('rt-under').classList.toggle('active-fmt', document.queryCommandState('underline'));
}
function positionToolbar(el) {
  const tb = document.getElementById('rtoolbar');
  const rect = el.getBoundingClientRect();
  let top = rect.top - 46;
  if (top < 8) top = rect.bottom + 6;
  const left = Math.max(8, Math.min(rect.left, window.innerWidth - 260));
  tb.style.top = top + 'px';
  tb.style.left = left + 'px';
  tb.classList.add('vis');
}
function hideToolbar() {
  document.getElementById('rtoolbar').classList.remove('vis');
  activeEditEl = null;
}

// ── Edit mode ─────────────────────────────────────────────────────────
async function toggleEditMode() {
  if (!serverAvail) { alert('Server non disponibile.'); return; }
  if (!editMode) {
    const pwd = prompt('Password modifica:');
    if (!pwd) return;
    const ok = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pwd })
    }).then(r => r.json()).then(d => d.ok).catch(() => false);
    if (!ok) { alert('Password errata.'); return; }
  }
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editBar').classList.toggle('vis', editMode);
  const btn = document.getElementById('btnEdit');
  btn.classList.toggle('active', editMode);
  btn.textContent = editMode ? '✏️ ON' : '✏️';
  if (!editMode) { hideToolbar(); removeEditMode(); }
  else { if (activeIdx !== null) showDetail(activeIdx); else applyEditMode(); }
}
function applyEditMode() {
  document.querySelectorAll('[data-path]').forEach(el => {
    el.contentEditable = 'true';
    if (!el._editInit) {
      el._editInit = true;
      el.addEventListener('input', () => syncEditEl(el));
      el.addEventListener('keyup', updateToolbarState);
      el.addEventListener('mouseup', updateToolbarState);
      el.addEventListener('focus', () => {
        activeEditEl = el;
        positionToolbar(el);
        updateToolbarState();
      });
      el.addEventListener('blur', () => {
        setTimeout(() => {
          if (!document.getElementById('rtoolbar').contains(document.activeElement))
            hideToolbar();
        }, 120);
      });
      el.addEventListener('click', e => { if (editMode) e.stopPropagation(); });
    }
  });
}
function removeEditMode() {
  document.querySelectorAll('[data-path]').forEach(el => { el.contentEditable = 'false'; });
}
function syncEditEl(el) {
  const path = el.dataset.path;
  if (!path) return;
  const parts = path.split('.');
  const ridx = parseInt(parts[0]);
  let val = el.innerHTML.replace(/(<br\s*\/?>\s*)+$/, '').trim();
  const hasRich = /<(strong|em|b|i|u|span|font)[^>]*>/i.test(val);
  if (!hasRich) val = val.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
  let obj = RIMEDI[ridx];
  for (let i = 1; i < parts.length - 1; i++) {
    const k = parts[i];
    obj = Array.isArray(obj) ? obj[parseInt(k, 10)] : obj[k];
    if (obj == null) return;
  }
  const lk = parts[parts.length - 1];
  const fk = Array.isArray(obj) ? parseInt(lk, 10) : lk;
  obj[fk] = (['note', 'proprieta', 'impiego_specifico'].includes(lk) && !val) ? null : val;
  markModified();
}
async function saveEdits() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'Salvo…';
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(RIMEDI)
    });
    const d = await res.json();
    if (d.ok) {
      document.getElementById('editMsg').textContent = `✅ Salvati ${d.rimedi} rimedi`;
      document.getElementById('editMsg').style.color = '#14532d';
      rebuildIngIndex();
    } else throw new Error(d.error || 'Errore sconosciuto');
  } catch (err) {
    document.getElementById('editMsg').textContent = '❌ Errore: ' + err.message;
    document.getElementById('editMsg').style.color = '#7f1d1d';
  }
  btn.disabled = false; btn.textContent = '💾 Salva';
}
function newRimedio() {
  const codice = prompt('Codice nuovo rimedio (es. R99):', 'R');
  if (!codice || !codice.trim()) return;
  const cod = codice.trim().toUpperCase();
  if (RIMEDI.some(r => r.codice === cod)) { alert(`Il codice ${cod} esiste già.`); return; }
  RIMEDI.push({
    codice: cod, nome: '', forma: [], disponibile: true,
    indicazioni: '', impiego_specifico: null,
    composizione: {}, posologia: {}, associazioni: [],
    note_associazioni: '', note: null, proprieta: null,
    sistema: '', tutti_apparati: [], sintomi_indice: []
  });
  const idx = RIMEDI.length - 1;
  renderList(); showDetail(idx); markModified();
  if (isMobile) mobileTab('dettaglio');
}
function setDispState(idx, state) {
  if (state === 'available') {
    RIMEDI[idx].disponibile = true;
    delete RIMEDI[idx].disponibile_india;
  } else if (state === 'india') {
    RIMEDI[idx].disponibile = false;
    RIMEDI[idx].disponibile_india = true;
  } else {
    RIMEDI[idx].disponibile = false;
    delete RIMEDI[idx].disponibile_india;
  }
  const wrap = document.getElementById(`dcard-code-${idx}`);
  if (wrap) {
    const s = getDispState(RIMEDI[idx]);
    wrap.innerHTML = RIMEDI[idx].codice +
      (s === 'india' ? `<div class="dcard-india">${indiaFlag('lg')}</div>` : '');
  }
  renderList(); markModified();
}
function cancelEdit() {
  if (confirm('Annullare tutte le modifiche non salvate?')) location.reload();
}
function rebuildIngIndex() {
  for (const k in ING_INDEX) delete ING_INDEX[k];
  for (const k in ING_SEARCH) delete ING_SEARCH[k];
  RIMEDI.forEach((r, ridx) => {
    Object.entries(r.composizione || {}).forEach(([forma, list]) => {
      (list || []).forEach((ing, ingidx) => {
        if (!ing.nome) return;
        if (!ING_INDEX[ing.nome]) ING_INDEX[ing.nome] = [];
        ING_INDEX[ing.nome].push({
          codice: r.codice, rimNome: r.nome || r.codice,
          ridx, forma, ingidx,
          tipo: ing.tipo || 'D', potenza: ing.potenza || 0,
          proprieta: (ing.proprieta || '').trim()
        });
        const nl = ing.nome.toLowerCase();
        if (!ING_SEARCH[nl]) ING_SEARCH[nl] = new Set();
        ING_SEARCH[nl].add(r.codice);
      });
    });
  });
}

// ── Comparatore ───────────────────────────────────────────────────────
function toggleCompare(idx) {
  const r = RIMEDI[idx];
  const pos = compareList.findIndex(x => x.idx === idx);
  if (pos >= 0) compareList.splice(pos, 1);
  else {
    if (compareList.length >= 4) { alert('Massimo 4 rimedi.'); return; }
    compareList.push({ idx, codice: r.codice, nome: r.nome || r.codice });
  }
  renderCompareBar();
  const btn = document.getElementById(`cmpBtn-${idx}`);
  if (btn) {
    const inC = compareList.some(x => x.idx === idx);
    btn.className = `btn-compare ${inC ? 'added' : ''}`;
    btn.textContent = inC ? '✓ Confronto' : '+ Confronta';
  }
  if (activeIdx !== null && compareList.length > 0) showDetail(activeIdx);
}
function renderCompareBar() {
  const bar = document.getElementById('compareBar');
  if (!compareList.length) { bar.classList.remove('vis'); return; }
  bar.classList.add('vis');
  document.getElementById('compareSlots').innerHTML = compareList.map(x =>
    `<div class="compare-slot">${x.codice}<button onclick="toggleCompare(${x.idx})">✕</button></div>`
  ).join('');
}
function clearCompare() {
  const idxs = compareList.map(x => x.idx);
  compareList = [];
  renderCompareBar();
  idxs.forEach(i => {
    const b = document.getElementById(`cmpBtn-${i}`);
    if (b) { b.className = 'btn-compare'; b.textContent = '+ Confronta'; }
  });
  if (activeIdx !== null) showDetail(activeIdx);
}
function openCompare() {
  if (compareList.length < 2) { alert('Seleziona almeno 2 rimedi.'); return; }
  const rimedi = compareList.map(x => RIMEDI[x.idx]);
  const n = rimedi.length;

  function getIngs(r) {
    const m = {};
    Object.values(r.composizione || {}).flat()
      .forEach(i => { if (i.nome && !m[i.nome]) m[i.nome] = `${i.tipo || 'D'}${i.potenza || ''}`; });
    return m;
  }
  const maps = rimedi.map(getIngs);
  const allNames = [...new Set(
    rimedi.flatMap(r => Object.values(r.composizione || {}).flat().map(i => i.nome).filter(Boolean))
  )].sort();
  const cnt = {};
  allNames.forEach(nm => { cnt[nm] = maps.filter(m => nm in m).length; });
  const sorted = allNames.sort((a, b) => (cnt[b] || 0) - (cnt[a] || 0));

  const colH = rimedi.map(r =>
    `<div class="cmp-col-header">
      <div class="cmp-col-code">${r.codice}</div>
      <div class="cmp-col-nome">${r.nome || '—'}</div>
    </div>`
  ).join('');

  const colB = rimedi.map((_, ci) => {
    const m = maps[ci];
    return `<div class="cmp-ing-section">
      ${sorted.map(nm => {
        const cls = cnt[nm] === n ? 'shared-all' : cnt[nm] > 1 ? 'shared-some' : 'unique';
        const dil = m[nm] || '';
        return `<div class="cmp-ing-item ${cls}${dil ? '' : ' absent'}">
          <span>${nm}</span>
          <span class="cmp-ing-dil">${dil || '—'}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  const sa = sorted.filter(nm => cnt[nm] === n).length;
  const ss = sorted.filter(nm => cnt[nm] > 1 && cnt[nm] < n).length;
  const su = sorted.filter(nm => cnt[nm] === 1).length;

  document.getElementById('cmpBody').innerHTML =
    `<div class="cmp-cols" style="grid-template-columns:repeat(${n},1fr)">${colH}</div>
     <div class="cmp-cols" style="grid-template-columns:repeat(${n},1fr);align-items:start">${colB}</div>
     <div class="cmp-summary">${sa} comuni a tutti · ${ss} comuni ad alcuni · ${su} esclusivi</div>`;

  document.getElementById('cmpOverlay').classList.add('open');
}
function closeCompare() { document.getElementById('cmpOverlay').classList.remove('open'); }
function cmpOverlayClick(e) { if (e.target.id === 'cmpOverlay') closeCompare(); }

// ── Sintomi / Indice ──────────────────────────────────────────────────
function filterBySintomo(s) {
  filterSintomo = (filterSintomo === s) ? null : s;
  searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('vis');
  renderList();
  if (isMobile) mobileTab('lista');
}
function clearSintomo() { filterSintomo = null; renderList(); }
function openIndice() {
  renderIndice('');
  document.getElementById('idxSearch').value = '';
  document.getElementById('idxOverlay').classList.add('open');
}
function closeIndice() { document.getElementById('idxOverlay').classList.remove('open'); }
function idxOverlayClick(e) { if (e.target.id === 'idxOverlay') closeIndice(); }
function renderIndice(q) {
  const filter = q.trim().toLowerCase();
  const tutti = Object.keys(SINTOMI_INDEX).sort((a, b) => a.localeCompare(b, 'it'));
  const filtrati = filter ? tutti.filter(s => s.toLowerCase().includes(filter)) : tutti;
  const gruppi = {};
  filtrati.forEach(s => {
    const l = s[0].toUpperCase();
    (gruppi[l] = gruppi[l] || []).push(s);
  });
  if (!filtrati.length) {
    document.getElementById('idxBody').innerHTML =
      '<div style="color:var(--muted);font-size:.9rem;padding:16px 0">Nessun sintomo trovato.</div>';
    return;
  }
  const directSintomi = new Set(RIMEDI.flatMap(r => r.sintomi_indice || []));
  document.getElementById('idxBody').innerHTML = Object.keys(gruppi).sort().map(l => `
    <div class="idx-letter">
      <div class="idx-letter-head">${l}</div>
      <div class="idx-chips">
        ${gruppi[l].map(s => {
          const n = SINTOMI_INDEX[s].size;
          const fromAssocOnly = ASSOC_TERMS.has(s) && !directSintomi.has(s);
          return `<div class="idx-chip${fromAssocOnly ? ' from-assoc' : ''}"
            onclick="closeIndice();filterBySintomo('${escJs(s)}')">
            <span>${s}</span><span class="idx-count">${n}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

// ── Associazioni ──────────────────────────────────────────────────────
function renderAssoc(r, ridx) {
  if (!(r.associazioni || []).length) {
    if (r.note_associazioni)
      return `<div class="dsec">
        <div class="dsec-label">Note associazioni</div>
        <div class="indicazioni" style="font-size:.88rem">${r.note_associazioni}</div>
      </div>`;
    return '';
  }
  return `<div class="dsec">
    <div class="dsec-label">Associazioni consigliate</div>
    ${r.associazioni.map((a, ai) => `
      <div class="assoc-row">
        <div class="assoc-cond">${a.condizione}</div>
        <div class="assoc-badges">
          ${(a.rimedi || []).map((c, ri) => editMode
            ? `<span class="assoc-badge-edit"
                data-path="${ridx}.associazioni.${ai}.rimedi.${ri}"
                contenteditable="false">${c}</span>`
            : `<span class="assoc-badge" onclick="goToRimedio('${c}')">${c}</span>`
          ).join('')}
        </div>
      </div>`).join('')}
  </div>`;
}

function switchForma(el, f) {
  const b = el.closest('.dcard-body');
  b.querySelectorAll('.forma-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  b.querySelectorAll('.ing-panel').forEach(p => p.style.display = p.dataset.forma === f ? 'block' : 'none');
}

// ── Utility ───────────────────────────────────────────────────────────
function goToRimedio(c) {
  const idx = RIMEDI.findIndex(r => r.codice === c);
  if (idx >= 0) {
    searchQ = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('vis');
    showDetail(idx);
  }
}
function toggleFilters() {
  document.getElementById('filtersPanel').classList.toggle('open');
  document.getElementById('btnFilter').classList.toggle('active',
    document.getElementById('filtersPanel').classList.contains('open'));
}
function clearSearch() {
  searchQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('vis');
  renderList();
}
function mobileTab(v) {
  document.getElementById('sidebar').classList.toggle('hidden', v === 'dettaglio');
  document.getElementById('detail').classList.toggle('hidden', v === 'lista');
  document.getElementById('bnav-lista').classList.toggle('active', v === 'lista');
  document.getElementById('bnav-dettaglio').classList.toggle('active', v === 'dettaglio');
}
function toggleForma(el) {
  filterForma = (filterForma === el.dataset.ftype) ? null : el.dataset.ftype;
  document.querySelectorAll('[data-ftype]').forEach(c =>
    c.classList.toggle('on', c.dataset.ftype === filterForma));
  renderList();
}
function toggleDisp(el) {
  filterDispOnly = !filterDispOnly;
  el.classList.toggle('on', filterDispOnly);
  renderList();
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  document.getElementById('searchClear').classList.toggle('vis', searchQ.length > 0);
  renderList();
});
document.addEventListener('mousedown', e => {
  const tb = document.getElementById('rtoolbar');
  if (!tb.contains(e.target) && !e.target.closest('[data-path]')) hideToolbar();
});
</script>
</body>
