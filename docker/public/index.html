<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dr. Reckeweg - Prontuario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root{--r:#C0392B;--r2:#922B21;--rl:#FDEAEA;--rm:#F5C6C2;--crema:#FAF8F5;--grigio:#F0ECE6;--bordo:#DDD8D0;--testo:#1C1917;--muted:#78716C;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);--green:#16a34a;--greenl:#dcfce7;--amber:#f59e0b;--amberl:#fef3c7}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--crema);color:var(--testo);font-family:'Source Sans 3',sans-serif;font-size:16px;overflow:hidden}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--r);padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(192,57,43,.4)}
.header-logo{font-family:'DM Mono',monospace;color:white;font-size:.72rem;letter-spacing:2px;opacity:.85;white-space:nowrap}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:8px 36px 8px 14px;border:none;border-radius:8px;background:rgba(255,255,255,.18);color:white;font-size:.95rem;font-family:'Source Sans 3',sans-serif;outline:none}
.search-wrap input::placeholder{color:rgba(255,255,255,.6)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;display:none}
.search-clear.vis{display:block}
.btn-filter{background:rgba(255,255,255,.18);border:none;border-radius:8px;color:white;padding:8px 12px;cursor:pointer;font-size:.85rem;white-space:nowrap;transition:background .15s}
.btn-filter.active{background:rgba(255,255,255,.32)}
.btn-edit{background:rgba(255,255,255,.18);border:none;border-radius:8px;color:white;padding:8px 11px;cursor:pointer;font-size:.85rem;white-space:nowrap;transition:background .15s;display:none}
.btn-edit.ready{display:flex;align-items:center;gap:5px}
.btn-edit.active{background:var(--amber);color:#1c1917;font-weight:600}

/* LAYOUT */
.layout{display:flex;height:100vh;padding-top:56px}
.sidebar{width:320px;min-width:260px;background:white;border-right:1px solid var(--bordo);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
@media(max-width:700px){.sidebar{width:100%;position:fixed;top:56px;left:0;right:0;bottom:60px;z-index:100}.sidebar.hidden{display:none}.detail{position:fixed;top:56px;left:0;right:0;bottom:60px;overflow-y:auto;z-index:100}.detail.hidden{display:none}.layout{padding-bottom:60px}}

/* FILTRI */
.filters-panel{background:var(--grigio);border-bottom:1px solid var(--bordo);overflow:hidden;max-height:0;transition:max-height .25s ease}
.filters-panel.open{max-height:240px}
.filters-inner{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.72rem;color:var(--muted);white-space:nowrap}
.chip{padding:4px 11px;border:1px solid var(--bordo);border-radius:20px;font-size:.76rem;background:white;cursor:pointer;transition:all .15s;color:var(--muted);white-space:nowrap;user-select:none}
.chip.on{background:var(--r);color:white;border-color:var(--r);font-weight:600}

/* LISTA */
.list-info{padding:8px 14px 6px;font-size:.78rem;color:var(--muted);border-bottom:1px solid var(--bordo);background:var(--crema);display:flex;justify-content:space-between;align-items:center}
.remedy-list{overflow-y:auto;flex:1;overscroll-behavior:contain}
.remedy-item{padding:11px 14px;border-bottom:1px solid var(--bordo);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:10px}
.remedy-item.active{background:var(--rl);border-left:3px solid var(--r)}
.item-code{background:var(--r);color:white;border-radius:5px;padding:2px 7px;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;min-width:38px;text-align:center;flex-shrink:0;margin-top:2px}
.item-code.fuori{background:var(--muted)}
.item-nome{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;line-height:1.3}
.item-preview{font-size:.77rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag{padding:1px 6px;border-radius:10px;font-size:.67rem;background:var(--grigio);color:var(--muted);margin-top:4px;display:inline-block}

/* DETTAGLIO */
.detail{flex:1;overflow-y:auto;background:var(--crema);overscroll-behavior:contain}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted)}
.dcard{max-width:780px;margin:20px auto;padding:0 16px 40px}
.dcard-header{background:var(--r);border-radius:12px 12px 0 0;padding:20px 24px;display:flex;align-items:center;gap:18px}
.dcard-code{font-family:'DM Mono',monospace;font-size:2rem;font-weight:500;color:white;background:rgba(0,0,0,.15);border-radius:8px;padding:6px 16px;letter-spacing:1px;flex-shrink:0}
.dcard-title{flex:1}
.dcard-title h2{font-family:'Crimson Pro',serif;font-size:1.45rem;font-weight:600;color:white;line-height:1.3}
.dcard-meta{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.app-badge{background:rgba(255,255,255,.2);color:white;border-radius:4px;padding:2px 8px;font-size:.72rem;font-family:'DM Mono',monospace}
.dcard-body{background:white;border-radius:0 0 12px 12px;box-shadow:var(--shadow)}
.dsec{padding:18px 24px;border-bottom:1px solid var(--bordo)}
.dsec:last-child{border-bottom:none}
.dsec-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:2px;color:var(--r);font-weight:500;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dsec-label::after{content:'';flex:1;height:1px;background:var(--rl)}
.indicazioni{font-size:.95rem;line-height:1.7;color:var(--testo)}

/* SINTOMI */
.sintomi-grid{display:flex;flex-wrap:wrap;gap:5px}
.sintomo-chip{padding:3px 9px;border-radius:12px;font-size:.76rem;background:var(--grigio);color:var(--muted);border:1px solid var(--bordo)}

/* INGREDIENTI */
.ing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.ing-chip{border:1px solid var(--bordo);border-radius:7px;padding:7px 11px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;background:var(--crema);gap:6px}
.ing-chip:hover{border-color:var(--r);background:var(--rl)}
.ing-chip.shared{border-color:var(--green);background:var(--greenl)}
.ing-name{font-size:.85rem;flex:1}
.ing-dil{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--r);font-weight:500;white-space:nowrap}
.ing-chip.shared .ing-dil{color:var(--green)}
.forma-tabs{display:flex;gap:8px;margin-bottom:14px}
.forma-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--bordo);font-size:.82rem;cursor:pointer;background:white;color:var(--muted)}
.forma-tab.on{background:var(--r);color:white;border-color:var(--r)}

/* POSOLOGIA */
.poso-box{background:var(--rl);border-left:3px solid var(--r);border-radius:0 8px 8px 0;padding:13px 16px;font-size:.9rem;line-height:1.7;color:var(--testo);margin-bottom:8px}
.poso-forma{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:1px;color:var(--r);font-weight:500;margin-bottom:6px;text-transform:uppercase}

/* ASSOCIAZIONI */
.assoc-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;background:var(--crema);border:1px solid var(--bordo);margin-bottom:6px}
.assoc-cond{flex:1;font-size:.88rem;color:var(--testo)}
.assoc-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.assoc-badge{background:var(--r);color:white;border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;white-space:nowrap;user-select:none}
.assoc-badge:hover{background:var(--r2)}
.backlink-wrap{display:flex;flex-wrap:wrap;gap:6px}

/* CONFRONTO */
.btn-compare{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;color:white;padding:6px 12px;font-size:.8rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-compare:hover,.btn-compare.added{background:rgba(255,255,255,.35);border-color:white}
.compare-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:white;border-top:2px solid var(--r);padding:10px 16px;display:none;align-items:center;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.12)}
.compare-bar.vis{display:flex}
@media(max-width:700px){.compare-bar{bottom:60px}}
.compare-slots{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.compare-slot{background:var(--rl);border:1px solid var(--rm);border-radius:6px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--r);display:flex;align-items:center;gap:6px}
.compare-slot button{background:none;border:none;color:var(--r);cursor:pointer;font-size:.9rem;line-height:1;padding:0 2px}
.btn-compare-go{background:var(--r);color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap}
.btn-compare-go:hover{background:var(--r2)}
.btn-compare-clear{background:none;border:1px solid var(--bordo);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:.82rem;color:var(--muted)}

/* MODALE CONFRONTO */
.cmp-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:600;overflow-y:auto;padding:24px 16px}
.cmp-overlay.open{display:block}
.cmp-card{background:white;border-radius:16px;max-width:1000px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.cmp-header{background:var(--r);padding:18px 24px;display:flex;justify-content:space-between;align-items:center}
.cmp-header h3{font-family:'Crimson Pro',serif;font-size:1.3rem;color:white;font-weight:600}
.cmp-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:white;cursor:pointer;font-size:1rem}
.cmp-legend{padding:12px 24px;background:var(--grigio);border-bottom:1px solid var(--bordo);font-size:.8rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:12px;height:12px;border-radius:50%}
.cmp-cols{display:grid;gap:0}
.cmp-col-header{padding:14px 20px;border-bottom:1px solid var(--bordo);border-right:1px solid var(--bordo);background:var(--crema)}
.cmp-col-header:last-child{border-right:none}
.cmp-col-code{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--r)}
.cmp-col-nome{font-family:'Crimson Pro',serif;font-size:.9rem;color:var(--muted);margin-top:2px}
.cmp-ing-section{padding:16px 20px;border-right:1px solid var(--bordo)}
.cmp-ing-section:last-child{border-right:none}
.cmp-ing-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:5px;margin-bottom:4px;font-size:.83rem;gap:8px}
.cmp-ing-item.shared-all{background:var(--greenl);border:1px solid #86efac}
.cmp-ing-item.shared-some{background:#fef9c3;border:1px solid #fde047}
.cmp-ing-item.unique{background:var(--crema);border:1px solid var(--bordo)}
.cmp-ing-item.absent{opacity:.28}
.cmp-ing-dil{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);flex-shrink:0}
.cmp-ing-item.shared-all .cmp-ing-dil{color:var(--green)}
.cmp-summary{padding:16px 24px;background:var(--grigio);border-top:1px solid var(--bordo);font-size:.85rem;color:var(--muted)}

/* MODALE INGREDIENTE */
.ing-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,23,.55);z-index:550;overflow-y:auto;padding:24px 16px}
.ing-overlay.open{display:block}
.ing-modal{background:white;border-radius:16px;max-width:680px;margin:0 auto;box-shadow:var(--shadow-lg);overflow:hidden}
.ing-modal-header{background:var(--r);padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start}
.ing-modal-nome{font-family:'Crimson Pro',serif;font-size:1.6rem;font-weight:600;color:white;font-style:italic;line-height:1.2}
.ing-modal-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;color:white;cursor:pointer;font-size:1rem;flex-shrink:0;margin-top:2px}
.ing-modal-stats{padding:10px 24px;background:var(--grigio);border-bottom:1px solid var(--bordo);font-size:.8rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ing-body{padding:0}
.pot-block{border-bottom:1px solid var(--bordo)}
.pot-block:last-child{border-bottom:none}
.pot-header{padding:12px 24px 10px;background:var(--crema);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bordo)}
.pot-badge{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:600;color:var(--r);background:var(--rl);border:1px solid var(--rm);border-radius:5px;padding:3px 10px}
.pot-count{font-size:.75rem;color:var(--muted)}
.pot-entries{padding:8px 24px 12px}
.pot-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--grigio)}
.pot-entry:last-child{border-bottom:none}
.pot-cod{flex-shrink:0;padding-top:1px}
.pot-cod-badge{background:var(--r);color:white;border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;display:inline-block}
.pot-cod-badge:hover{background:var(--r2)}
.pot-details{flex:1;min-width:0}
.pot-rimedio-nome{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:3px}
.pot-prop{font-size:.88rem;line-height:1.55;color:var(--testo)}
.pot-prop.empty{color:var(--muted);font-style:italic}
/* campo nome ingrediente editabile nell'entry */
.pot-ing-nome{font-size:.8rem;font-weight:600;color:var(--testo);margin-bottom:2px}

/* ── EDIT MODE ─────────────────────────────────────────────────────── */
/* Campi editabili - visibili solo in edit mode */
body.edit-mode [data-path]{
  outline:1px dashed var(--amber);
  border-radius:3px;
  background:var(--amberl) !important;
  cursor:text;
  min-height:1em;
  transition:outline .1s,background .1s
}
body.edit-mode [data-path]:focus{
  outline:2px solid var(--amber);
  background:white !important;
  box-shadow:0 0 0 3px rgba(245,158,11,.2)
}
/* Barra salvataggio */
.edit-bar{position:fixed;top:56px;left:0;right:0;z-index:250;background:var(--amber);padding:8px 20px;display:none;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(245,158,11,.4)}
.edit-bar.vis{display:flex}
.edit-bar-msg{flex:1;font-size:.85rem;font-weight:600;color:#1c1917}
.edit-bar-msg.saved{color:var(--green)}
.btn-eb{border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:.82rem;font-weight:600}
.btn-eb-save{background:#1c1917;color:white}
.btn-eb-save:disabled{opacity:.5;cursor:not-allowed}
.btn-eb-cancel{background:rgba(0,0,0,.15);color:#1c1917}
/* Quando la edit-bar è visibile, sposta il layout */
body.edit-mode .layout{padding-top:calc(56px + 40px)}
body.edit-mode .sidebar{top:calc(56px + 40px)}
@media(max-width:700px){body.edit-mode .detail{top:calc(56px + 40px)}}

/* MOBILE NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:white;border-top:1px solid var(--bordo);height:60px}
@media(max-width:700px){.bottom-nav{display:flex}}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-size:.65rem;color:var(--muted)}
.bnav-btn.active{color:var(--r)}
mark{background:rgba(192,57,43,.15);color:inherit;border-radius:2px;padding:0 1px}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">DR.RECKEWEG</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cerca rimedio, sintomo, ingrediente…" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <button class="btn-filter" id="btnFilter" onclick="toggleFilters()">Filtri</button>
  <button class="btn-edit" id="btnEdit" onclick="toggleEditMode()" title="Modalità modifica">✏️</button>
</header>

<!-- Barra edit mode -->
<div class="edit-bar" id="editBar">
  <span class="edit-bar-msg" id="editMsg">✏️ Modalità modifica — clicca su qualsiasi testo per modificarlo</span>
  <button class="btn-eb btn-eb-cancel" onclick="cancelEdit()">Annulla</button>
  <button class="btn-eb btn-eb-save" id="btnSave" onclick="saveEdits()">💾 Salva</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="filters-panel" id="filtersPanel">
      <div class="filters-inner">
        <div class="filter-row" id="filterSistema"><span class="filter-label">Apparato</span></div>
        <div class="filter-row">
          <span class="filter-label">Forma</span>
          <div class="chip" data-ftype="Gocce" onclick="toggleForma(this)">Gocce</div>
          <div class="chip" data-ftype="Compresse" onclick="toggleForma(this)">Compresse</div>
          <div class="chip" data-ftype="Sciroppo" onclick="toggleForma(this)">Sciroppo</div>
          <div class="chip" data-fdisp="false" onclick="toggleDisp(this)">Fuori produzione</div>
        </div>
      </div>
    </div>
    <div class="list-info"><span id="listCount">— rimedi</span></div>
    <div class="remedy-list" id="remedyList"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-empty">
      <div style="font-family:'DM Mono',monospace;font-size:1.5rem;color:var(--muted);letter-spacing:3px">DR.RECKEWEG</div>
      <p style="font-size:.9rem">Seleziona un rimedio dalla lista</p>
    </div>
  </div>
</div>

<div class="compare-bar" id="compareBar">
  <div class="compare-slots" id="compareSlots"></div>
  <button class="btn-compare-clear" onclick="clearCompare()">Svuota</button>
  <button class="btn-compare-go" onclick="openCompare()">Confronta ▶</button>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn active" id="bnav-lista" onclick="mobileTab('lista')">☰ Lista</button>
  <button class="bnav-btn" id="bnav-dettaglio" onclick="mobileTab('dettaglio')">📋 Dettaglio</button>
</nav>

<!-- Modale ingrediente -->
<div class="ing-overlay" id="ingOverlay" onclick="ingOverlayClick(event)">
  <div class="ing-modal">
    <div class="ing-modal-header">
      <div>
        <div class="ing-modal-nome" id="ingNome"></div>
        <div id="ingSubtitle" style="color:rgba(255,255,255,.75);font-size:.82rem;margin-top:4px"></div>
      </div>
      <button class="ing-modal-close" onclick="closeIngOverlay()">✕</button>
    </div>
    <div class="ing-modal-stats" id="ingStats"></div>
    <div class="ing-body" id="ingBody"></div>
  </div>
</div>

<!-- Modale confronto -->
<div class="cmp-overlay" id="cmpOverlay" onclick="cmpOverlayClick(event)">
  <div class="cmp-card">
    <div class="cmp-header">
      <h3>Confronto ingredienti</h3>
      <button class="cmp-close" onclick="closeCompare()">✕</button>
    </div>
    <div class="cmp-legend">
      <div class="leg-item"><div class="leg-dot" style="background:#86efac"></div>Comune a tutti</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fde047"></div>Comune ad alcuni</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--bordo)"></div>Esclusivo</div>
    </div>
    <div id="cmpBody"></div>
  </div>
</div>

<script>
// ── Stato ──────────────────────────────────────────────────────────────
let searchQ='',filterSistema=null,filterForma=null,filterDispOnly=false,activeIdx=null;
let isMobile=window.innerWidth<=700,compareList=[];
let editMode=false,serverAvail=false;

// ING_INDEX: nome → [{codice,rimNome,ridx,forma,ingidx,tipo,potenza,proprieta}]
const ING_INDEX={},BACKLINKS={},ING_SEARCH={};

// ── Init ───────────────────────────────────────────────────────────────
function initApp(){
  if(typeof RIMEDI==='undefined'){alert('data.js non trovato!');return;}
  RIMEDI.forEach((r,ridx)=>{
    Object.entries(r.composizione||{}).forEach(([forma,list])=>{
      (list||[]).forEach((ing,ingidx)=>{
        if(!ing.nome)return;
        if(!ING_INDEX[ing.nome])ING_INDEX[ing.nome]=[];
        ING_INDEX[ing.nome].push({codice:r.codice,rimNome:r.nome||r.codice,
          ridx,forma,ingidx,tipo:ing.tipo||'D',potenza:ing.potenza||0,proprieta:(ing.proprieta||'').trim()});
        const nl=ing.nome.toLowerCase();
        if(!ING_SEARCH[nl])ING_SEARCH[nl]=new Set();
        ING_SEARCH[nl].add(r.codice);
      });
    });
    (r.associazioni||[]).forEach(a=>{
      (a.rimedi||[]).forEach(c=>{
        (BACKLINKS[c]=BACKLINKS[c]||[]).indexOf(r.codice)<0&&BACKLINKS[c].push(r.codice);
      });
    });
  });
  const sistemi=[...new Set(RIMEDI.map(r=>r.sistema).filter(Boolean))].sort();
  const fsEl=document.getElementById('filterSistema');
  sistemi.forEach(s=>{
    const c=document.createElement('div');c.className='chip';c.textContent=s;c.dataset.sistema=s;
    c.onclick=()=>{document.querySelectorAll('[data-sistema]').forEach(x=>x.classList.remove('on'));filterSistema=(filterSistema===s)?null:s;if(filterSistema)c.classList.add('on');renderList();};
    fsEl.appendChild(c);
  });
  renderList();
  // Controlla disponibilità server per edit
  fetch('/api/ping').then(r=>r.json()).then(d=>{if(d.ok){serverAvail=true;document.getElementById('btnEdit').classList.add('ready');}}).catch(()=>{});
}

// ── Lista ──────────────────────────────────────────────────────────────
function renderList(){
  const tokens=searchQ.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const visible=RIMEDI.filter(r=>{
    const hay=[r.codice,r.nome,r.indicazioni,r.sistema,(r.sintomi_indice||[]).join(' ')].join(' ').toLowerCase();
    const matchRim=!tokens.length||tokens.every(t=>hay.includes(t));
    const matchIng=!tokens.length||tokens.every(t=>{
      if(hay.includes(t))return true;
      for(const nl of Object.keys(ING_SEARCH))if(nl.includes(t)&&ING_SEARCH[nl].has(r.codice))return true;
      return false;
    });
    return(matchRim||matchIng)&&(!filterSistema||r.sistema===filterSistema)&&(!filterForma||(r.forma||[]).includes(filterForma))&&(!filterDispOnly||r.disponibile===false);
  });
  document.getElementById('listCount').textContent=visible.length+' rimedi';
  document.getElementById('remedyList').innerHTML=visible.map(r=>{
    const ri=RIMEDI.indexOf(r);
    const prev=(r.indicazioni||(r.sintomi_indice||[]).slice(0,3).join(', ')||'').substring(0,65);
    return`<div class="remedy-item ${activeIdx===ri?'active':''}" onclick="showDetail(${ri})">
      <div class="item-code ${r.disponibile===false?'fuori':''}">${r.codice}</div>
      <div style="min-width:0">
        <div class="item-nome">${r.nome||'—'}</div>
        <div class="item-preview">${prev}…</div>
        ${r.sistema?`<span class="tag">${r.sistema}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── Dettaglio rimedio ──────────────────────────────────────────────────
function showDetail(idx){
  activeIdx=idx;const r=RIMEDI[idx];
  const forme=Object.keys(r.composizione||{});
  let compHTML='';
  if(!forme.length)compHTML='<em style="color:var(--muted);font-size:.85rem">Non disponibile</em>';
  else if(forme.length===1)compHTML=ingGrid(r.composizione[forme[0]],r.codice,idx,forme[0]);
  else compHTML='<div class="forma-tabs">'+forme.map((f,i)=>`<div class="forma-tab ${i===0?'on':''}" onclick="switchForma(this,'${f}')">${f}</div>`).join('')+'</div>'+
    forme.map((f,i)=>`<div class="ing-panel" data-forma="${f}" style="${i>0?'display:none':''}">${ingGrid(r.composizione[f],r.codice,idx,f)}</div>`).join('');

  // data-path="ridx.field" per i campi editabili
  const ep=i=>`data-path="${i}`;  // shorthand

  const posoHTML=Object.entries(r.posologia||{}).filter(([,v])=>v).map(([k,v])=>
    `<div class="poso-box"><div class="poso-forma">${k}</div><span data-path="${idx}.posologia.${k}" contenteditable="false">${v}</span></div>`).join('');

  const appBadges=(r.tutti_apparati||[]).map(a=>`<span class="app-badge">${a}</span>`).join('');
  const sintomiHTML=(r.sintomi_indice||[]).length
    ?`<div class="dsec"><div class="dsec-label">Indicazioni terapeutiche</div><div class="sintomi-grid">${r.sintomi_indice.map(s=>`<span class="sintomo-chip">${s}</span>`).join('')}</div></div>`:'' ;
  const bl=BACKLINKS[r.codice]||[];
  const backHTML=bl.length?`<div class="dsec"><div class="dsec-label">Consigliato in associazione da</div><div class="backlink-wrap">${bl.map(c=>`<span class="assoc-badge" onclick="goToRimedio('${c}')">${c}</span>`).join('')}</div></div>`:'';
  const inC=compareList.some(x=>x.idx===idx);
  const btnCmp=`<button class="btn-compare ${inC?'added':''}" onclick="toggleCompare(${idx})" id="cmpBtn-${idx}">${inC?'✓ Nel confronto':'+ Confronta'}</button>`;

  document.getElementById('detail').innerHTML=`
    <div class="dcard">
      <div class="dcard-header">
        <div class="dcard-code">${r.codice}</div>
        <div class="dcard-title">
          <h2><span data-path="${idx}.nome" contenteditable="false">${r.nome||'—'}</span></h2>
          ${appBadges?`<div class="dcard-meta">${appBadges}</div>`:''}
        </div>
        ${btnCmp}
      </div>
      <div class="dcard-body">
        ${r.indicazioni?`<div class="dsec"><div class="dsec-label">Impiego generale</div><div class="indicazioni"><span data-path="${idx}.indicazioni" contenteditable="false">${r.indicazioni}</span></div></div>`:''}
        ${sintomiHTML}
        ${forme.length?`<div class="dsec"><div class="dsec-label">Composizione</div>${compHTML}</div>`:''}
        ${posoHTML?`<div class="dsec"><div class="dsec-label">Posologia</div>${posoHTML}</div>`:''}
        ${renderAssoc(r)}
        ${backHTML}
      </div>
    </div>`;

  // Applica stato edit mode ai nuovi elementi
  if(editMode)applyEditMode();
  if(isMobile)mobileTab('dettaglio');
  renderList();
}

// ── Griglia ingredienti ────────────────────────────────────────────────
function ingGrid(list,thisCod,ridx,forma){
  if(!list||!list.length)return'<em style="color:var(--muted);font-size:.85rem">—</em>';
  const otherIdxs=compareList.filter(x=>RIMEDI[x.idx].codice!==thisCod).map(x=>x.idx);
  const sharedWith=new Set();
  if(otherIdxs.length){
    const oSets=otherIdxs.map(i=>new Set(Object.values(RIMEDI[i].composizione||{}).flat().map(x=>x.nome)));
    list.forEach(i=>{if(oSets.some(s=>s.has(i.nome)))sharedWith.add(i.nome);});
  }
  return`<div class="ing-grid">${list.map((i,ingidx)=>{
    const sh=sharedWith.has(i.nome);
    const dil=`${i.tipo||'D'}${i.potenza||''}`;
    return`<div class="ing-chip ${sh?'shared':''}" onclick="showIngrediente('${escJs(i.nome)}')">
      <span class="ing-name">${i.nome}</span>
      <span class="ing-dil">${dil}</span>
    </div>`;
  }).join('')}</div>`;
}

// ── Modale ingrediente ─────────────────────────────────────────────────
function showIngrediente(nome){
  const entries=ING_INDEX[nome];if(!entries||!entries.length)return;
  const byPot={};
  entries.forEach(e=>{const k=`${e.tipo||'D'}${e.potenza||''}`;(byPot[k]=byPot[k]||[]).push(e);});
  const potKeys=Object.keys(byPot).sort((a,b)=>(parseInt(a.replace(/\D/g,''))||0)-(parseInt(b.replace(/\D/g,''))||0));
  const codiciUnici=[...new Set(entries.map(e=>e.codice))];

  document.getElementById('ingNome').textContent=nome;
  document.getElementById('ingSubtitle').textContent=`Presente in ${codiciUnici.length} ${codiciUnici.length===1?'rimedio':'rimedi'} · ${potKeys.length} ${potKeys.length===1?'diluizione':'diluizioni'}`;
  document.getElementById('ingStats').innerHTML=codiciUnici.map(c=>`<span class="assoc-badge" onclick="closeIngOverlay();goToRimedio('${c}')">${c}</span>`).join(' ');

  document.getElementById('ingBody').innerHTML=potKeys.map(pot=>{
    const potEntries=byPot[pot];
    const rows=potEntries.map(e=>`
      <div class="pot-entry">
        <div class="pot-cod"><span class="pot-cod-badge" onclick="closeIngOverlay();goToRimedio('${e.codice}')">${e.codice}</span></div>
        <div class="pot-details">
          <div class="pot-rimedio-nome">${e.rimNome||e.codice}</div>
          <div class="pot-prop ${e.proprieta?'':'empty'}" data-path="${e.ridx}.composizione.${e.forma}.${e.ingidx}.proprieta" contenteditable="false">${e.proprieta||'Nessuna descrizione.'}</div>
        </div>
      </div>`).join('');
    return`<div class="pot-block"><div class="pot-header"><span class="pot-badge">${pot}</span><span class="pot-count">${potEntries.length} ${potEntries.length===1?'rimedio':'rimedi'}</span></div><div class="pot-entries">${rows}</div></div>`;
  }).join('');

  // Applica edit mode se attivo
  if(editMode)applyEditMode();
  document.getElementById('ingOverlay').classList.add('open');
}

function closeIngOverlay(){document.getElementById('ingOverlay').classList.remove('open');}
function ingOverlayClick(e){if(e.target.id==='ingOverlay')closeIngOverlay();}

// ── Edit mode ──────────────────────────────────────────────────────────
function toggleEditMode(){
  if(!serverAvail){alert('Server non disponibile.\nAvvia server.py per usare la modalità modifica.');return;}
  editMode=!editMode;
  document.body.classList.toggle('edit-mode',editMode);
  document.getElementById('editBar').classList.toggle('vis',editMode);
  const btn=document.getElementById('btnEdit');
  btn.classList.toggle('active',editMode);
  btn.textContent=editMode?'✏️ ON':'✏️';
  if(editMode)applyEditMode();
  else removeEditMode();
}

function applyEditMode(){
  document.querySelectorAll('[data-path]').forEach(el=>{
    el.contentEditable='true';
    if(!el._editHandler){
      el._editHandler=()=>syncEdit(el);
      el.addEventListener('input',el._editHandler);
    }
    // Blocca i click figli che aprirebbero modali
    if(!el._clickBlocker){
      el._clickBlocker=e=>{if(editMode)e.stopPropagation();};
      el.addEventListener('click',el._clickBlocker);
    }
  });
}

function removeEditMode(){
  document.querySelectorAll('[data-path]').forEach(el=>{
    el.contentEditable='false';
  });
}

// Sincronizza modifica DOM → RIMEDI in tempo reale
function syncEdit(el){
  const path=el.dataset.path;
  if(!path)return;
  const parts=path.split('.');
  const ridx=parseInt(parts[0]);
  const val=el.innerText.trim();
  let obj=RIMEDI[ridx];
  for(let i=1;i<parts.length-1;i++){
    const k=parts[i];
    obj=obj[k];
    if(obj===undefined||obj===null)return;
  }
  const lastKey=parts[parts.length-1];
  obj[lastKey]=val;
  // Marca come modificato
  document.getElementById('editMsg').textContent='✏️ Modifiche non salvate — ricorda di salvare';
  document.getElementById('editMsg').style.color='#7c2d12';
}

async function saveEdits(){
  const btn=document.getElementById('btnSave');
  btn.disabled=true;btn.textContent='Salvo…';
  try{
    const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(RIMEDI)});
    const d=await res.json();
    if(d.ok){
      const msg=document.getElementById('editMsg');
      msg.textContent=`✅ Salvati ${d.rimedi} rimedi`;msg.style.color='#14532d';
      // Ricostruisci ING_INDEX con dati aggiornati
      rebuildIngIndex();
    }else throw new Error(d.error||'Errore sconosciuto');
  }catch(err){
    document.getElementById('editMsg').textContent='❌ Errore: '+err.message;
    document.getElementById('editMsg').style.color='#7f1d1d';
  }
  btn.disabled=false;btn.textContent='💾 Salva';
}

function cancelEdit(){
  // Ricarica data.js tornando ai dati salvati
  if(confirm('Annullare tutte le modifiche non salvate?')){
    location.reload();
  }
}

function rebuildIngIndex(){
  // Aggiorna ING_INDEX e ING_SEARCH dopo un salvataggio
  for(const k in ING_INDEX)delete ING_INDEX[k];
  for(const k in ING_SEARCH)delete ING_SEARCH[k];
  RIMEDI.forEach((r,ridx)=>{
    Object.entries(r.composizione||{}).forEach(([forma,list])=>{
      (list||[]).forEach((ing,ingidx)=>{
        if(!ing.nome)return;
        if(!ING_INDEX[ing.nome])ING_INDEX[ing.nome]=[];
        ING_INDEX[ing.nome].push({codice:r.codice,rimNome:r.nome||r.codice,ridx,forma,ingidx,tipo:ing.tipo||'D',potenza:ing.potenza||0,proprieta:(ing.proprieta||'').trim()});
        const nl=ing.nome.toLowerCase();
        if(!ING_SEARCH[nl])ING_SEARCH[nl]=new Set();
        ING_SEARCH[nl].add(r.codice);
      });
    });
  });
}

// ── Comparatore ────────────────────────────────────────────────────────
function toggleCompare(idx){
  const r=RIMEDI[idx];const pos=compareList.findIndex(x=>x.idx===idx);
  if(pos>=0)compareList.splice(pos,1);
  else{if(compareList.length>=4){alert('Massimo 4 rimedi.');return;}compareList.push({idx,codice:r.codice,nome:r.nome||r.codice});}
  renderCompareBar();
  const btn=document.getElementById(`cmpBtn-${idx}`);
  if(btn){const inC=compareList.some(x=>x.idx===idx);btn.className=`btn-compare ${inC?'added':''}`;btn.textContent=inC?'✓ Nel confronto':'+ Confronta';}
  if(activeIdx!==null&&compareList.length>0)showDetail(activeIdx);
}
function renderCompareBar(){
  const bar=document.getElementById('compareBar');
  if(!compareList.length){bar.classList.remove('vis');return;}
  bar.classList.add('vis');
  document.getElementById('compareSlots').innerHTML=compareList.map(x=>`<div class="compare-slot">${x.codice}<button onclick="toggleCompare(${x.idx})">✕</button></div>`).join('');
}
function clearCompare(){
  const idxs=compareList.map(x=>x.idx);compareList=[];renderCompareBar();
  idxs.forEach(i=>{const b=document.getElementById(`cmpBtn-${i}`);if(b){b.className='btn-compare';b.textContent='+ Confronta';}});
  if(activeIdx!==null)showDetail(activeIdx);
}
function openCompare(){
  if(compareList.length<2){alert('Seleziona almeno 2 rimedi.');return;}
  const rimedi=compareList.map(x=>RIMEDI[x.idx]),n=rimedi.length;
  function getIngs(r){const m={};Object.values(r.composizione||{}).flat().forEach(i=>{if(i.nome&&!m[i.nome])m[i.nome]=`${i.tipo||'D'}${i.potenza||''}`;});return m;}
  const maps=rimedi.map(getIngs);
  const allNames=[...new Set(rimedi.flatMap(r=>Object.values(r.composizione||{}).flat().map(i=>i.nome).filter(Boolean)))].sort();
  const cnt={};allNames.forEach(nm=>{cnt[nm]=maps.filter(m=>nm in m).length;});
  const sorted=allNames.sort((a,b)=>(cnt[b]||0)-(cnt[a]||0));
  const colH=rimedi.map(r=>`<div class="cmp-col-header"><div class="cmp-col-code">${r.codice}</div><div class="cmp-col-nome">${r.nome||'—'}</div></div>`).join('');
  const colB=rimedi.map((_,ci)=>{const m=maps[ci];return`<div class="cmp-ing-section">${sorted.map(nm=>{const cls=cnt[nm]===n?'shared-all':cnt[nm]>1?'shared-some':'unique';const dil=m[nm]||'';return`<div class="cmp-ing-item ${cls}${dil?'':' absent'}"><span style="font-size:.82rem">${nm}</span><span class="cmp-ing-dil">${dil||'—'}</span></div>`;}).join('')}</div>`;}).join('');
  const sa=sorted.filter(nm=>cnt[nm]===n).length,ss=sorted.filter(nm=>cnt[nm]>1&&cnt[nm]<n).length,su=sorted.filter(nm=>cnt[nm]===1).length;
  document.getElementById('cmpBody').innerHTML=`<div class="cmp-cols" style="grid-template-columns:repeat(${n},1fr)">${colH}</div><div class="cmp-cols" style="grid-template-columns:repeat(${n},1fr);align-items:start">${colB}</div><div class="cmp-summary">${sa} comuni a tutti · ${ss} comuni ad alcuni · ${su} esclusivi</div>`;
  document.getElementById('cmpOverlay').classList.add('open');
}
function closeCompare(){document.getElementById('cmpOverlay').classList.remove('open');}
function cmpOverlayClick(e){if(e.target.id==='cmpOverlay')closeCompare();}

// ── Associazioni ───────────────────────────────────────────────────────
function renderAssoc(r){
  if(!(r.associazioni||[]).length){
    if(r.note_associazioni)return`<div class="dsec"><div class="dsec-label">Note associazioni</div><div class="indicazioni" style="font-size:.88rem">${r.note_associazioni}</div></div>`;
    return'';
  }
  return`<div class="dsec"><div class="dsec-label">Associazioni consigliate</div>`+r.associazioni.map(a=>`<div class="assoc-row"><div class="assoc-cond">${a.condizione}</div><div class="assoc-badges">${(a.rimedi||[]).map(c=>`<span class="assoc-badge" onclick="goToRimedio('${c}')">${c}</span>`).join('')}</div></div>`).join('')+`</div>`;
}
function switchForma(el,f){const b=el.closest('.dcard-body');b.querySelectorAll('.forma-tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');b.querySelectorAll('.ing-panel').forEach(p=>p.style.display=p.dataset.forma===f?'block':'none');}

// ── Utility ────────────────────────────────────────────────────────────
function goToRimedio(c){const idx=RIMEDI.findIndex(r=>r.codice===c);if(idx>=0){searchQ='';document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('vis');showDetail(idx);}}
function toggleFilters(){document.getElementById('filtersPanel').classList.toggle('open');document.getElementById('btnFilter').classList.toggle('active',document.getElementById('filtersPanel').classList.contains('open'));}
function clearSearch(){searchQ='';document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('vis');renderList();}
function mobileTab(v){document.getElementById('sidebar').classList.toggle('hidden',v==='dettaglio');document.getElementById('detail').classList.toggle('hidden',v==='lista');document.getElementById('bnav-lista').classList.toggle('active',v==='lista');document.getElementById('bnav-dettaglio').classList.toggle('active',v==='dettaglio');}
function escJs(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function toggleForma(el){filterForma=(filterForma===el.dataset.ftype)?null:el.dataset.ftype;document.querySelectorAll('[data-ftype]').forEach(c=>c.classList.toggle('on',c.dataset.ftype===filterForma));renderList();}
function toggleDisp(el){filterDispOnly=!filterDispOnly;el.classList.toggle('on',filterDispOnly);renderList();}

document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value;document.getElementById('searchClear').classList.toggle('vis',searchQ.length>0);renderList();});
window.onload=initApp;
</script>
</body>
