services:
  reckeweg:
    image: ghcr.io/${GHCR_ORG}/reckeweg:${IMAGE_TAG:-latest}
    container_name: reckeweg
    restart: unless-stopped
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      MAX_BACKUPS: ${MAX_BACKUPS:-20}
    volumes:
      - type: bind
        source: ${DATA_PATH:-/srv/docker/reckeweg}
        target: /app/data
    networks:
      - kayabridge

networks:
  kayabridge:
    name: ${NETWORK_NAME:-kayabridge}
    external: true
